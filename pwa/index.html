<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6f8f72" />
    <title>Putzplan</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Laura und Dino</p>
        <h1>Putzplan</h1>
      </section>

      <section class="today-card" id="today-card">
        <div>
          <p class="label">Heute</p>
          <h2 id="today-date">-</h2>
        </div>
        <div class="chips today-chips" role="tablist" aria-label="Filter">
          <button class="chip active" data-filter="all" type="button">Alle</button>
          <button class="chip" data-filter="Laura" type="button">Laura</button>
          <button class="chip" data-filter="Dino" type="button">Dino</button>
        </div>
        <p class="today-summary" id="today-summary">Plan wird geladen...</p>
      </section>

      <section class="stats" id="stats"></section>

      <section class="dropdown-section">
        <button class="dropdown-summary" type="button" data-accordion="custom-task-list" aria-expanded="false">
          <p class="label">Tasks</p>
          <h3>Alle Aufgaben bearbeiten</h3>
        </button>
        <section class="custom-task-list accordion-content hidden" id="custom-task-list">
          <form class="task-form inline-task-form" id="task-form">
            <input id="task-id" name="id" type="hidden" />
            <label>
              <span>Name</span>
              <input id="task-name" name="name" type="text" placeholder="z. B. Fenster putzen" required />
            </label>

            <label>
              <span>Startdatum</span>
              <input id="task-start-date" name="startDate" type="date" required />
            </label>

            <div class="form-row">
              <label>
                <span>Wiederholung</span>
                <select name="unit">
                  <option value="days">Tage</option>
                  <option value="weeks" selected>Wochen</option>
                  <option value="months">Monate</option>
                </select>
              </label>

              <label>
                <span>Intervall</span>
                <input name="interval" type="number" min="1" value="1" required />
              </label>
            </div>

            <div class="form-actions">
              <button class="primary-button" id="task-submit-button" type="submit">Aufgabe speichern</button>
              <button class="ghost-button hidden" id="task-cancel-edit" type="button">Bearbeiten abbrechen</button>
            </div>
          </form>

          <div class="custom-task-items" id="custom-task-items"></div>
        </section>
      </section>

      <section class="dropdown-section">
        <button class="dropdown-summary" type="button" data-accordion="day-list" aria-expanded="false">
          <p class="label">Tagesplan</p>
          <h3>Alle Aufgaben im Blick</h3>
        </button>
        <section class="day-list accordion-content hidden" id="day-list"></section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
